name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          cd /opt/leadframe-inventory
          git config --global --add safe.directory /opt/leadframe-inventory
          git fetch origin
          git reset --hard origin/main

          # 后端：安装依赖（requirements.txt 有变更时）
          cd backend
          ./venv/bin/pip install -r requirements.txt -q

          # 前端：安装依赖并构建
          cd ../frontend
          npm install
          npm run build

          # PM2 重启后端
          cd /opt/leadframe-inventory
          pm2 restart leadframe-inv || pm2 start ecosystem.config.js
          pm2 save
